format = """
[](#cba6f7)\
$os\
$username\
[](bg:#89b4fa fg:#cba6f7)\
$directory\
[](fg:#89b4fa bg:#313244)\
$git_branch\
$git_status\
[](fg:#313244)\
$fill\
$cmd_duration\
$line_break\
$character"""

palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
overlay0 = "#6c7086"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[os]
disabled = false
style = "bg:#cba6f7 fg:#1e1e2e"

[os.symbols]
Arch = "󰣇 "
Linux = " "

[username]
show_always = true
style_user = "bg:#cba6f7 fg:#1e1e2e bold"
format = "[$user ]($style)"

[directory]
style = "bg:#89b4fa fg:#1e1e2e bold"
format = "[ $path ]($style)"
truncation_length = 3

[git_branch]
symbol = " "
style = "bg:#313244 fg:#cba6f7"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "bg:#313244 fg:#f38ba8"
format = "[$all_status$ahead_behind ]($style)"

[fill]
symbol = " "

[cmd_duration]
min_time = 2000
format = "[ $duration]($style) "
style = "fg:overlay0"

[character]
success_symbol = "[❯](mauve)"
error_symbol = "[❯](red)"
