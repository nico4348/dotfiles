# === General ===
mod_key = "super"
focus_follows_mouse = true

# Programas al iniciar
autostart = [
    "gnome-keyring-daemon --start --components=secrets,pkcs11", # keyring
    "waybar",                               # barra de estado
    "swaync",                               # notificaciones
    "wl-paste --type text --watch cliphist store",   # historial portapapeles (texto)
    "wl-paste --type image --watch cliphist store",  # historial portapapeles (imagen)
    # ydotoold se lanza via systemd user service (enabled): systemctl --user status ydotool
    "wlsunset -S 07:00 -s 19:00 -t 3500 -T 6500",  # luz azul: 3500K noche, 6500K dia
    "swayidle -w before-sleep 'swaylock -f -c 1e1e2e'",  # solo bloquea al suspender
    "ghostty --title=term1",                # terminal 1
    "ghostty --title=term2",                # terminal 2
    "ghostty --title=term3",                # terminal 3
    "ghostty --title=term4",                # terminal 4 (centro)
    "ghostty --title=peaclock -e peaclock", # reloj (encima de term4)
    "brave",                                # navegador
]

# === Variables de entorno ===
[env]
MOZ_ENABLE_WAYLAND = "1"
QT_QPA_PLATFORM = "wayland"
ELECTRON_OZONE_PLATFORM_HINT = "auto"
GBM_BACKEND = "nvidia-drm"
__GLX_VENDOR_LIBRARY_NAME = "nvidia"
WLR_NO_HARDWARE_CURSORS = "1"
LIBVA_DRIVER_NAME = "nvidia"
YDOTOOL_SOCKET = "/run/user/1000/.ydotool_socket"

# === Teclado ===
[input.keyboard]
layout = "es"
repeat_rate = 30
repeat_delay = 300

# === Trackpad ===
[input.trackpad]
tap_to_click = true
natural_scroll = true
tap_and_drag = true
accel_speed = 0.2

# === Mouse ===
[input.mouse]
accel_profile = "flat"

# === Cursor ===
[cursor]
theme = "catppuccin-mocha-lavender-cursors"
size = 32

# === Navegacion ===
[navigation]
friction = 0.93
animation_speed = 0.35

# === Zoom ===
[zoom]
step = 1.15

# === Snap (imanes entre ventanas) ===
[snap]
enabled = true
gap = 10.0

# === Decoraciones ===
[decorations]
bg_color = "#1e1e2e"
fg_color = "#cdd6f4"
corner_radius = 12

# === Efectos ===
[effects]
blur_radius = 3
blur_strength = 1.2

# === Fondo animado ===
[background]
shader_path = "~/.config/driftwm/dark_sea_purple.glsl"

# === Atajos de teclado ===
[keybindings]
"mod+return" = "exec ghostty"
"mod+d" = "exec rofi -show drun -show-icons"
"mod+q" = "close-window"
"mod+f" = "toggle-fullscreen"
"mod+m" = "fit-window"
"mod+c" = "center-window"
"mod+a" = "home-toggle"
"mod+w" = "zoom-to-fit"
# Portapapeles: rofi con historial de cliphist + auto-paste via ydotool.
# Detecta el tipo del elemento seleccionado:
#   - Imagen (cliphist marca "binary data") -> Ctrl+V       (29:1 47:1 47:0 29:0)
#   - Texto                                  -> Ctrl+Shift+V (29:1 42:1 47:1 47:0 42:0 29:0)
# Keycodes: 29=LCTRL, 42=LSHIFT, 47=V
"mod+v" = "spawn sh -c 'SEL=$(cliphist list | rofi -dmenu -p clipboard); [ -z \"$SEL\" ] && exit; printf %s \"$SEL\" | cliphist decode | wl-copy; sleep 0.08; case \"$SEL\" in *\"binary data\"*) ydotool key 29:1 47:1 47:0 29:0 ;; *) ydotool key 29:1 42:1 47:1 47:0 42:0 29:0 ;; esac'"
"mod+l" = "spawn swaylock -f -c 1e1e2e"
"mod+ctrl+shift+q" = "quit"

# Capturas de pantalla
"Print" = "spawn grim - | wl-copy"
"mod+shift+s" = "spawn grim -g \"$(slurp -d)\" - | wl-copy"

# Volumen
"XF86AudioRaiseVolume" = "spawn wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+"
"XF86AudioLowerVolume" = "spawn wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-"
"XF86AudioMute" = "spawn wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle"

# Brillo
"XF86MonBrightnessUp" = "spawn brightnessctl set +5%"
"XF86MonBrightnessDown" = "spawn brightnessctl set 5%-"

# === Monitor ===
[[outputs]]
name = "DP-1"
mode = "3440x1440@165"

# === Window rules: layout en fila, term4 al centro ===

[[window_rules]]
title = "term1"
position = [-3330, 0]
size = [1100, 700]
opacity = 0.88
blur = true

[[window_rules]]
title = "term2"
position = [-2220, 0]
size = [1100, 700]
opacity = 0.88
blur = true

[[window_rules]]
title = "term3"
position = [-1110, 0]
size = [1100, 700]
opacity = 0.88
blur = true

[[window_rules]]
title = "term4"
position = [0, 0]
size = [1100, 700]
opacity = 0.88
blur = true

[[window_rules]]
title = "peaclock"
position = [0, 575]
size = [500, 250]
opacity = 0.88
blur = true

[[window_rules]]
app_id = "brave-browser"
position = [1800, 0]
size = [1920, 1080]

[[window_rules]]
app_id = "chromium"
position = [1200, 0]
size = [1920, 1080]

[[window_rules]]
app_id = "firefox"
position = [1200, 0]
size = [1920, 1080]

[[window_rules]]
app_id = "com.mitchellh.ghostty"
size = [1100, 700]
opacity = 0.88
blur = true

[[window_rules]]
app_id = "tableplus"
size = [2800, 900]

[[window_rules]]
app_id = "code-oss"
size = [1920, 1080]
